<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinos Turísticos</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body class="bg-gray-200">

    <div class="max-w-7xl mx-auto p-8">

        <div class="grid grid-cols-2 gap-8">

            <div class="bg-white rounded-2xl shadow-lg p-4">

                <img
                    src="img/img3.jpg"
                    alt="Playa tropical"
                    class="w-full h-72 object-cover rounded-xl">

                <h2 class="text-2xl text-center text-gray-600 mt-8 mb-6">
                    Parque Turistico
                </h2>

            </div>

            <div class="bg-white rounded-2xl shadow-lg p-4">

                <img
                    src="img/img4.jpg"
                    alt="Europa"
                    class="w-full h-72 object-cover rounded-xl">

                <h2 class="text-2xl text-center text-gray-600 mt-8 mb-6">
                    Europa
                </h2>

            </div>

            <div class="bg-white rounded-2xl shadow-lg p-4">

                <img
                    src="img/img5.jpg"
                    alt="Lago"
                    class="w-full h-72 object-cover rounded-xl">

                <h2 class="text-2xl text-center text-gray-600 mt-8 mb-6">
                    Viejas vías ferrareas
                </h2>

            </div>

            <div class="bg-white rounded-2xl shadow-lg p-4">

                <img
                    src="img/img6.jpg"
                    alt="Parque Natural"
                    class="w-full h-72 object-cover rounded-xl">

                <h2 class="text-2xl text-center text-gray-600 mt-8 mb-6">
                    Parque Natural
                </h2>
            </div>
        </div>
    </div>
</body>
</html>
